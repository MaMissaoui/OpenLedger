# Full OpenLedger stack: PostgreSQL + Go API + web SPA.
#   docker compose up --build
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openledger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openledger}
      POSTGRES_DB: ${POSTGRES_DB:-openledger}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openledger} -d ${POSTGRES_DB:-openledger}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./apps/api
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-openledger}:${POSTGRES_PASSWORD:-openledger}@db:5432/${POSTGRES_DB:-openledger}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      PORT: "8080"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  web:
    build: ./apps/web
    environment:
      VITE_API_BASE_URL: ${API_BASE_URL:-http://localhost:8080}
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  pgdata:
