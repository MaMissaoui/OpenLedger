# OpenLedger application stack.
#
# Auth is handled by homelab-auth (separate repo).
# homelab-auth must be running first — it provides the 'proxy' Docker network,
# Traefik (router + auth middleware), Authelia, lldap, and Redis.
#
# Prerequisites:
#   1. homelab-auth is up (docker compose -f ../homelab-auth/docker-compose.yml up -d)
#   2. 'proxy' Docker network exists (homelab-auth creates it on first run)
#   3. In NPM: openledger.<DOMAIN> → <Pi IP>:8888 (Traefik)
#   4. In homelab-auth/deploy/authelia/configuration.yml: add openledger.<DOMAIN> rule
#      then: docker compose -f ../homelab-auth/docker-compose.yml restart authelia
#
# First-time DB setup:
#   docker compose run --rm api goose -dir /app/db/migrations postgres "$DATABASE_URL" up
#   docker compose run --rm api ./seed   (optional demo data)
#
# Usage:
#   docker compose up --build

networks:
  proxy:
    external: true  # Managed by homelab-auth; Traefik routes on this network.
  internal:
    driver: bridge  # db ↔ api traffic only, not exposed to Traefik.

services:
  # ---------------------------------------------------------------------------
  # Database — internal only, not reachable from the proxy network.
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openledger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-openledger}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openledger} -d ${POSTGRES_DB:-openledger}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # API — Go HTTP server. Traefik routes /api/* to this container via the
  # proxy network and applies the authelia forwardAuth middleware.
  # ---------------------------------------------------------------------------
  api:
    build: ./apps/api
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-openledger}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-openledger}?sslmode=disable
      PORT: "8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      # /api/* — protected by Authelia; Traefik injects Remote-User/Remote-Email.
      - "traefik.http.routers.openledger-api.rule=Host(`openledger.${DOMAIN}`) && PathPrefix(`/api`)"
      - traefik.http.routers.openledger-api.entrypoints=web
      - traefik.http.routers.openledger-api.middlewares=authelia@docker
      - traefik.http.services.openledger-api.loadbalancer.server.port=8080
      # /healthz — public, no auth required (used by monitoring / compose healthcheck).
      - "traefik.http.routers.openledger-healthz.rule=Host(`openledger.${DOMAIN}`) && Path(`/healthz`)"
      - traefik.http.routers.openledger-healthz.entrypoints=web
      - traefik.http.routers.openledger-healthz.priority=10
      - traefik.http.services.openledger-healthz.loadbalancer.server.port=8080
    networks:
      - proxy
      - internal
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Web — nginx serving the React SPA. Traefik routes /* (catch-all) here.
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ./apps/web
      args:
        # Baked into the bundle at build time; used for the sign-out link and
        # 401 redirects. Point at your Authelia portal URL.
        VITE_AUTHELIA_PORTAL_URL: ${VITE_AUTHELIA_PORTAL_URL}
    depends_on:
      - api
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - "traefik.http.routers.openledger-web.rule=Host(`openledger.${DOMAIN}`)"
      - traefik.http.routers.openledger-web.entrypoints=web
      - traefik.http.routers.openledger-web.middlewares=authelia@docker
      - traefik.http.services.openledger-web.loadbalancer.server.port=80
    networks:
      - proxy
    restart: unless-stopped

volumes:
  pgdata:
