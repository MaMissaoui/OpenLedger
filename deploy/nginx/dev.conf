# Dev auth shim for docker-compose.dev.yml.
# Injects fake Authelia headers so requireAuth passes without a real Authelia stack.
# Change Remote-User to match the LDAP UID of your dev user in the database.
#
# Routes:
#   /api/*    → Go API on host port 8090
#   /healthz  → Go API on host port 8090 (public endpoint)
#   /*        → Vite dev server on host port 5173 (with WebSocket for HMR)

server {
    listen 80;
    server_name openledger.localhost;

    location ~ ^/(api|healthz) {
        proxy_pass         http://host.docker.internal:8090;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Fake Authelia headers — the Go API's requireAuth reads these.
        proxy_set_header   Remote-User dev;
        proxy_set_header   Remote-Email dev@localhost;
        proxy_set_header   Remote-Name "Dev User";
        proxy_set_header   Remote-Groups "";
    }

    location / {
        proxy_pass          http://host.docker.internal:5173;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        # WebSocket support for Vite HMR.
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection "upgrade";
    }
}
