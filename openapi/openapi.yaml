openapi: 3.1.0
info:
  title: OpenLedger API
  version: 0.1.0
  description: >
    GnuCash-derived double-entry accounting API. This spec is the source of
    truth for request/response shapes; the web frontend consumes a generated
    TypeScript client. Money is always exact rational num/denom pairs, never a
    JSON float.
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      summary: Liveness/readiness check
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
  /api/v1/transactions:
    post:
      summary: Post a balanced transaction
      operationId: postTransaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewTransaction"
      responses:
        "201":
          description: Transaction posted
        "422":
          description: Transaction does not balance to zero
  /api/v1/accounts/{id}/register:
    get:
      summary: Paginated account register with running balances
      operationId: getAccountRegister
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: A page of the register
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterPage"
        "404":
          description: Account not found
components:
  schemas:
    Health:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
    Numeric:
      type: object
      description: Exact rational amount (numerator/denominator).
      required: [num, denom]
      properties:
        num:
          type: integer
          format: int64
        denom:
          type: integer
          format: int64
          example: 100
    NewSplit:
      type: object
      required: [accountGuid, value, quantity]
      properties:
        accountGuid:
          type: string
        memo:
          type: string
        value:
          $ref: "#/components/schemas/Numeric"
        quantity:
          $ref: "#/components/schemas/Numeric"
    NewTransaction:
      type: object
      required: [currencyGuid, postDate, splits]
      properties:
        currencyGuid:
          type: string
        num:
          type: string
        postDate:
          type: string
          format: date-time
        description:
          type: string
        splits:
          type: array
          minItems: 2
          items:
            $ref: "#/components/schemas/NewSplit"
    RegisterEntry:
      type: object
      properties:
        splitGuid:
          type: string
        txGuid:
          type: string
        postDate:
          type: string
          format: date-time
        description:
          type: string
        memo:
          type: string
        reconcile:
          type: string
          description: GnuCash reconcile flag (n/c/y/f/v).
        value:
          $ref: "#/components/schemas/Numeric"
        quantity:
          $ref: "#/components/schemas/Numeric"
        balance:
          $ref: "#/components/schemas/Numeric"
          description: Running balance in the account commodity.
    RegisterPage:
      type: object
      properties:
        accountGuid:
          type: string
        total:
          type: integer
          format: int64
        limit:
          type: integer
        offset:
          type: integer
        entries:
          type: array
          items:
            $ref: "#/components/schemas/RegisterEntry"
