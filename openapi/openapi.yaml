          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostInvoiceRequest"
      responses:
        "200":
          description: Posted invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        "404":
          description: Invoice not found
        "422":
          description: Already posted or no entries

  /api/v1/invoices/{id}/entries:
    get:
      summary: List entries for an invoice
      operationId: listEntries
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Entry list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntryList"
    post:
      summary: Add a line item to a draft invoice
      operationId: addEntry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewEntry"
      responses:
        "201":
          description: Created entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entry"
        "422":
          description: Invoice already posted

  /api/v1/entries/{id}:
    patch:
      summary: Update a line item
      operationId: updateEntry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewEntry"
      responses:
        "200":
          description: Updated entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entry"
        "404":
          description: Entry not found
        "422":
          description: Invoice already posted
    delete:
      summary: Delete a line item
      operationId: deleteEntry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "404":
          description: Entry not found
        "422":
          description: Invoice already posted

components:
  schemas:
    Health:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
    NewCommodity:
      type: object
      required: [mnemonic]
      properties:
        namespace:
          type: string
          description: Defaults to CURRENCY.
        mnemonic:
          type: string
          example: USD
        fullname:
          type: string
        fraction:
          type: integer
          format: int64
          description: Smallest-unit denominator. Defaults to 100.
          example: 100
    Commodity:
      type: object
      properties:
        guid:
          type: string
        namespace:
          type: string
        mnemonic:
          type: string
        fullname:
          type: string
        fraction:
          type: integer
          format: int64
    CommodityList:
      type: object
      properties:
        commodities:
          type: array
          items:
            $ref: "#/components/schemas/Commodity"
    NewPrice:
      type: object
      required: [commodityGuid, currencyGuid, value]
      properties:
        commodityGuid:
          type: string
          description: The commodity being priced.
        currencyGuid:
          type: string
          description: The currency the value is expressed in.
        date:
          type: string
          format: date-time
          description: Defaults to now when omitted.
        source:
          type: string
          description: Free-form provenance. Defaults to "user:price".
        type:
          type: string
        value:
          allOf:
            - $ref: "#/components/schemas/Numeric"
          description: Units of currency per one unit of commodity.
    PriceRefreshStatus:
      type: object
      properties:
        enabled:
          type: boolean
        intervalHours:
          type: integer
        lastRunAt:
          type: string
          format: date-time
          nullable: true
        lastFetched:
          type: integer
        lastFailed:
          type: integer

    PriceRefreshResult:
      type: object
      properties:
        fetched:
          type: integer
        skipped:
          type: integer
        failed:
          type: integer

    FetchPrice:
      type: object
      required: [commodityGuid, currencyGuid]
      properties:
        commodityGuid:
          type: string
          description: The currency commodity to quote (must be a CURRENCY commodity).
        currencyGuid:
          type: string
          description: The currency to express the rate in (must differ from commodityGuid).
    Price:
      type: object
      properties:
        guid:
          type: string
        commodityGuid:
          type: string
        currencyGuid:
          type: string
        date:
          type: string
          format: date-time
        source:
          type: string
        type:
          type: string
        value:
          $ref: "#/components/schemas/Numeric"
    PriceList:
      type: object
      properties:
        prices:
          type: array
          items:
            $ref: "#/components/schemas/Price"
    Book:
      type: object
      properties:
        guid:
          type: string
        name:
          type: string
          description: Human-readable company/ledger name.
        currencyGuid:
          type: string
          description: Home currency commodity GUID; empty string if not set.
        rootAccountGuid:
          type: string
          description: Parent for top-level accounts.
    NewBook:
      type: object
      properties:
        name:
          type: string
          description: Human-readable company/ledger name.
        currencyGuid:
          type: string
          description: Home currency commodity GUID; empty string if not set.
    UpdateBook:
      type: object
      properties:
        name:
          type: string
          description: New company/ledger name.
        currencyGuid:
          type: string
          description: Home currency commodity GUID; empty string to unset.
    BookList:
      type: object
      properties:
        books:
          type: array
          items:
            $ref: "#/components/schemas/Book"
    NewAccount:
      type: object
      required: [bookGuid, name, type]
      properties:
        bookGuid:
          type: string
        parentGuid:
          type: string
          description: Defaults to the book's root account when omitted.
        name:
          type: string
        type:
          type: string
          description: GnuCash account type (ASSET, BANK, EXPENSE, EQUITY, …).
        commodityGuid:
          type: string
          description: Required for non-ROOT accounts.
        code:
          type: string
        description:
          type: string
        placeholder:
          type: boolean
    Account:
      type: object
      properties:
        guid:
          type: string
        name:
          type: string
        type:
          type: string
        commodityGuid:
          type: string
        parentGuid:
          type: string
        code:
          type: string
        description:
          type: string
        placeholder:
          type: boolean
    AccountWithBalance:
      allOf:
        - $ref: "#/components/schemas/Account"
        - type: object
          properties:
            balance:
              allOf:
                - $ref: "#/components/schemas/Numeric"
              description: >-
                Sum of the account's own splits, in its own commodity, rendered
                at the commodity fraction. Excludes subtree roll-ups.
            subtreeBalance:
              allOf:
                - $ref: "#/components/schemas/Numeric"
              description: >-
                The account's own balance plus the balances of all descendants
                sharing its commodity (the roll-up shown against placeholder
                parents). Descendants in a different commodity are not converted.
    AccountList:
      type: object
      properties:
        bookGuid:
          type: string
        accounts:
          type: array
          items:
            $ref: "#/components/schemas/AccountWithBalance"
    ReportLine:
      type: object
      description: One account's natural-sign balance within a report section.
      properties:
        account:
          $ref: "#/components/schemas/Account"
        balance:
          $ref: "#/components/schemas/Numeric"
    ReportSection:
      type: object
      description: >-
        A group of report lines with their total, both in natural sign
        (positive for the account type's normal direction). Zero-balance
        accounts are omitted.
      properties:
        lines:
          type: array
          items:
            $ref: "#/components/schemas/ReportLine"
        total:
          $ref: "#/components/schemas/Numeric"
    BalanceSheet:
      type: object
      description: >-
        Point-in-time statement of financial position. For a balanced book,
        assets.total equals totalLiabilitiesAndEquity. Single-currency only;
        balances are not converted across commodities.
      properties:
        bookGuid:
          type: string
        asOf:
          type: string
          format: date-time
        assets:
          $ref: "#/components/schemas/ReportSection"
        liabilities:
          $ref: "#/components/schemas/ReportSection"
        equity:
          $ref: "#/components/schemas/ReportSection"
        retainedEarnings:
          allOf:
            - $ref: "#/components/schemas/Numeric"
          description: Net income for the period, folded into equity.
        totalLiabilitiesAndEquity:
          $ref: "#/components/schemas/Numeric"
    IncomeStatement:
      type: object
      description: Statement of performance over [from, to]. Single-currency only.
      properties:
        bookGuid:
          type: string
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        income:
          $ref: "#/components/schemas/ReportSection"
        expense:
          $ref: "#/components/schemas/ReportSection"
        netIncome:
          allOf:
            - $ref: "#/components/schemas/Numeric"
          description: Total income minus total expense.
    CashFlowLine:
      type: object
      description: >-
        One account's cash effect for the period: inflow positive, outflow
        negative (the negative of the account's own balance change).
      properties:
        account:
          $ref: "#/components/schemas/Account"
        amount:
          $ref: "#/components/schemas/Numeric"
    CashFlowSection:
      type: object
      description: >-
        A group of cash flow lines with their total. Zero-effect accounts are
        omitted.
      properties:
        lines:
          type: array
          items:
            $ref: "#/components/schemas/CashFlowLine"
        total:
          $ref: "#/components/schemas/Numeric"
    CashFlowStatement:
      type: object
      description: >-
        Movement of cash over [from, to], grouped into operating, investing,
        and financing activities. Rests on the double-entry identity that the
        change in cash equals the negative of the change in every non-cash
        account. Single-currency only; balances are not converted across
        commodities.
      properties:
        bookGuid:
          type: string
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        operating:
          $ref: "#/components/schemas/CashFlowSection"
        investing:
          $ref: "#/components/schemas/CashFlowSection"
        financing:
          $ref: "#/components/schemas/CashFlowSection"
        netChange:
          allOf:
            - $ref: "#/components/schemas/Numeric"
          description: Operating + investing + financing — the period's change in cash.
        beginningCash:
          $ref: "#/components/schemas/Numeric"
        endingCash:
          $ref: "#/components/schemas/Numeric"
    ForecastPoint:
      type: object
      description: Projected cash at the end of one month, with that month's flows.
      properties:
        date:
          type: string
          format: date-time
        projectedCash:
          $ref: "#/components/schemas/Numeric"
        inflow:
          $ref: "#/components/schemas/Numeric"
        outflow:
          $ref: "#/components/schemas/Numeric"
    ForecastEvent:
      type: object
      description: >-
        One projected cash movement — a single occurrence of a scheduled
        transaction, with its net effect on cash (inflow positive, outflow
        negative).
      properties:
        date:
          type: string
          format: date-time
        name:
          type: string
        amount:
          $ref: "#/components/schemas/Numeric"
    CashFlowForecast:
      type: object
      description: >-
        Forward projection of cash over [from, to], simulating the book's
        scheduled transactions. Single-currency only.
      properties:
        bookGuid:
          type: string
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        startingCash:
          $ref: "#/components/schemas/Numeric"
        endingCash:
          $ref: "#/components/schemas/Numeric"
        netChange:
          $ref: "#/components/schemas/Numeric"
        lowestCash:
          allOf:
            - $ref: "#/components/schemas/Numeric"
          description: The tightest projected cash position in the horizon.
        lowestDate:
          type: string
          format: date-time
        points:
          type: array
          items:
            $ref: "#/components/schemas/ForecastPoint"
        events:
          type: array
          items:
            $ref: "#/components/schemas/ForecastEvent"
    Portfolio:
      type: object
      description: Security-holdings report for a book.
      properties:
        bookGuid:
          type: string
        holdings:
          type: array
          items:
            $ref: "#/components/schemas/Holding"
    Holding:
      type: object
      description: >-
        One security position. shares is in the account's commodity; costBasis,
        price, marketValue and unrealizedGain are in the quote currency. When
        hasPrice is false the market-value fields are absent.
      required: [account, shares, costBasis, hasPrice]
      properties:
        account:
          $ref: "#/components/schemas/Account"
        shares:
          $ref: "#/components/schemas/Numeric"
        costBasis:
          $ref: "#/components/schemas/Numeric"
        hasPrice:
          type: boolean
        price:
          $ref: "#/components/schemas/Numeric"
        priceCurrencyGuid:
          type: string
        marketValue:
          $ref: "#/components/schemas/Numeric"
        unrealizedGain:
          $ref: "#/components/schemas/Numeric"
    CapitalGainsReport:
      type: object
      description: Realized gains/losses over [from, to], in natural sign.
      properties:
        bookGuid:
          type: string
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        lines:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date-time
              description:
                type: string
              account:
                type: string
              amount:
                $ref: "#/components/schemas/Numeric"
        total:
          $ref: "#/components/schemas/Numeric"
    Trade:
      type: object
      description: A security buy or sell request.
      required: [securityAccountGuid, cashAccountGuid, shares, cash]
      properties:
        securityAccountGuid:
          type: string
        cashAccountGuid:
          type: string
        shares:
          allOf:
            - $ref: "#/components/schemas/Numeric"
          description: Quantity of shares, in the security's commodity.
        cash:
          allOf:
            - $ref: "#/components/schemas/Numeric"
          description: Total cash paid (buy) or received (sell), in the cash currency.
        description:
          type: string
        postDate:
          type: string
          format: date-time
    TradeResult:
      type: object
      required: [transactionGuid, realizedGain]
      properties:
        transactionGuid:
          type: string
        realizedGain:
          allOf:
            - $ref: "#/components/schemas/Numeric"
          description: Realized gain for a sale (zero for a buy).
    Numeric:
      type: object
      description: Exact rational amount (numerator/denominator).
      required: [num, denom]
      properties:
        num:
          type: integer
          format: int64
        denom:
          type: integer
          format: int64
          example: 100
    NewSplit:
      type: object
      required: [accountGuid, value, quantity]
      properties:
        accountGuid:
          type: string
        memo:
          type: string
        value:
          $ref: "#/components/schemas/Numeric"
        quantity:
          $ref: "#/components/schemas/Numeric"
    NewTransaction:
      type: object
      required: [currencyGuid, postDate, splits]
      properties:
        currencyGuid:
          type: string
        num:
          type: string
        postDate:
          type: string
          format: date-time
        description:
          type: string
        splits:
          type: array
          minItems: 2
          items:
            $ref: "#/components/schemas/NewSplit"
    Split:
      type: object
      properties:
        guid:
          type: string
        accountGuid:
          type: string
        memo:
          type: string
        action:
          type: string
        value:
          $ref: "#/components/schemas/Numeric"
        quantity:
          $ref: "#/components/schemas/Numeric"
    Transaction:
      type: object
      properties:
        guid:
          type: string
        currencyGuid:
          type: string
        num:
          type: string
        postDate:
          type: string
          format: date-time
        description:
          type: string
        splits:
          type: array
          items:
            $ref: "#/components/schemas/Split"
    RegisterEntry:
      type: object
      properties:
        splitGuid:
          type: string
        txGuid:
          type: string
        postDate:
          type: string
          format: date-time
        description:
          type: string
        memo:
          type: string
        reconcile:
          type: string
          description: GnuCash reconcile flag (n/c/y/f/v).
        value:
          $ref: "#/components/schemas/Numeric"
        quantity:
          $ref: "#/components/schemas/Numeric"
        balance:
          $ref: "#/components/schemas/Numeric"
          description: Running balance in the account commodity.
    RegisterPage:
      type: object
      properties:
        accountGuid:
          type: string
        total:
          type: integer
          format: int64
        limit:
          type: integer
        offset:
          type: integer
        entries:
          type: array
          items:
            $ref: "#/components/schemas/RegisterEntry"
    ImportResult:
      type: object
      description: Summary of a completed GnuCash import.
      properties:
        bookGuid:
          type: string
          description: GUID of the newly created book (preserved from the file).
        commodities:
          type: integer
          description: Number of commodities imported.
        accounts:
          type: integer
          description: Number of accounts imported (including root accounts).
        transactions:
          type: integer
          description: Number of transactions imported.
    BankImportResult:
      type: object
      description: Summary of a completed OFX/QIF statement import.
      properties:
        accountGuid:
          type: string
          description: GUID of the account the statement was imported into.
        imported:
          type: integer
          description: Number of new transactions posted.
        skipped:
          type: integer
          description: Number of lines skipped as already-imported duplicates.
    CsvPreview:
      type: object
      description: First rows of an uploaded CSV, used to drive the mapping wizard.
      properties:
        rows:
          type: array
          description: Up to 11 rows, each an array of cell strings (verbatim).
          items:
            type: array
            items:
              type: string
        totalRows:
          type: integer
          description: Total number of rows in the file.
        columns:
          type: integer
          description: Column count of the widest row.
    CsvMapping:
      type: object
      description: >
        Column mapping for a CSV import (posted as a JSON string in the import's
        `mapping` field). Columns are zero-based. Provide either amountCol, or
        debitCol and/or creditCol.
      properties:
        hasHeader:
          type: boolean
          description: Whether the first row is a header to skip.
        dateCol:
          type: integer
        dateFormat:
          type: string
          description: A Go time layout (e.g. "2006-01-02"); blank tries common layouts.
        descCols:
          type: array
          items:
            type: integer
          description: Columns joined to form the description.
        amountCol:
          type: integer
          nullable: true
          description: Single signed-amount column; omit when using debit/credit.
        debitCol:
          type: integer
          nullable: true
          description: Money-out column (positive values).
        creditCol:
          type: integer
          nullable: true
          description: Money-in column (positive values).
        invert:
          type: boolean
          description: Negate the resulting amount (banks that list outflows as positive).
    ScheduledSplit:
      type: object
      required: [accountGuid, value]
      properties:
        guid:
          type: string
        accountGuid:
          type: string
        memo:
          type: string
        value:
          $ref: "#/components/schemas/Numeric"
    NewScheduledTransaction:
      type: object
      required: [name, currencyGuid, period, startDate, splits]
      properties:
        name:
          type: string
          example: Monthly Rent
        description:
          type: string
        enabled:
          type: boolean
          default: true
        currencyGuid:
          type: string
        period:
          type: string
          enum: [once, daily, weekly, monthly, yearly]
        every:
          type: integer
          minimum: 1
          default: 1
          description: Multiplier on period (e.g. every=2 + period=weekly → biweekly).
        startDate:
          type: string
          format: date
          example: "2024-01-01"
        endDate:
          type: string
          format: date
          description: Optional end date; omit for indefinite recurrence.
        splits:
          type: array
          minItems: 2
          items:
            $ref: "#/components/schemas/ScheduledSplit"
    ScheduledTransaction:
      allOf:
        - $ref: "#/components/schemas/NewScheduledTransaction"
        - type: object
          properties:
            guid:
              type: string
            bookGuid:
              type: string
            lastPostedDate:
              type: string
              format: date
            nextDueDate:
              type: string
              format: date
    ScheduledTransactionList:
      type: object
      properties:
        bookGuid:
          type: string
        scheduledTransactions:
          type: array
          items:
            $ref: "#/components/schemas/ScheduledTransaction"
    PostDueResult:
      type: object
      properties:
        bookGuid:
          type: string
        posted:
          type: array
          items:
            type: object
            properties:
              scheduleGuid:
                type: string
              name:
                type: string
              postDate:
                type: string
                format: date
              txGuid:
                type: string

    BudgetAmount:
      type: object
      required: [accountGuid, periodNum, value]
      properties:
        accountGuid:
          type: string
        periodNum:
          type: integer
        value:
          $ref: "#/components/schemas/GncNumeric"

    NewBudget:
      type: object
      required: [name, periodType, numPeriods, startDate]
      properties:
        name:
          type: string
        description:
          type: string
        periodType:
          type: string
          enum: [monthly, quarterly, yearly]
        numPeriods:
          type: integer
        startDate:
          type: string
          format: date
        amounts:
          type: array
          items:
            $ref: "#/components/schemas/BudgetAmount"

    Budget:
      allOf:
        - $ref: "#/components/schemas/NewBudget"
        - type: object
          properties:
            guid:
              type: string
            bookGuid:
              type: string

    BudgetList:
      type: object
      properties:
        bookGuid:
          type: string
        budgets:
          type: array
          items:
            $ref: "#/components/schemas/Budget"

    NewBillTerm:
      type: object
      required: [name, type]
      description: >
        Payment terms. type=days is net dueDays after the invoice date;
        type=proximo is due on dueDays-of-the-month, rolling to the month after
        when the invoice date is past cutoff.
      properties:
        name:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [days, proximo]
        dueDays:
          type: integer
          description: days→net days; proximo→due day-of-month (1..31)
        discountDays:
          type: integer
          description: early-payment window, in days after the invoice date
        discount:
          allOf:
            - $ref: "#/components/schemas/Numeric"
          description: early-payment discount fraction (e.g. 2/100); omit for none
        cutoff:
          type: integer
          description: proximo→invoices dated after this day-of-month roll to the month after

    BillTerm:
      allOf:
        - $ref: "#/components/schemas/NewBillTerm"
        - type: object
          properties:
            guid:
              type: string
            bookGuid:
              type: string

    BillTermList:
      type: object
      properties:
        bookGuid:
          type: string
        billTerms:
          type: array
          items:
            $ref: "#/components/schemas/BillTerm"

    TaxTableEntry:
      type: object
      required: [accountGuid, type, amount]
      properties:
        accountGuid:
          type: string
          description: the tax account this component posts to
        type:
          type: string
          enum: [percentage, value]
        amount:
          allOf:
            - $ref: "#/components/schemas/Numeric"
          description: percentage→the rate (e.g. 20 for 20%); value→a flat amount

    NewTaxTable:
      type: object
      required: [name, entries]
      description: >
        A named set of tax components applied to taxable invoice/bill lines. Tax
        is exclusive: computed tax is added on top of the line total.
      properties:
        name:
          type: string
        entries:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/TaxTableEntry"

    TaxTable:
      allOf:
        - $ref: "#/components/schemas/NewTaxTable"
        - type: object
          properties:
            guid:
              type: string
            bookGuid:
              type: string

    TaxTableList:
      type: object
      properties:
        bookGuid:
          type: string
