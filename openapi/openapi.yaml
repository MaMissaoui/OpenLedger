openapi: 3.1.0
info:
  title: OpenLedger API
  version: 0.1.0
  description: >
    GnuCash-derived double-entry accounting API. This spec is the source of
    truth for request/response shapes; the web frontend consumes a generated
    TypeScript client. Money is always exact rational num/denom pairs, never a
    JSON float.
servers:
  - url: http://openledger.localhost
# Authentication is handled at the proxy layer (Traefik + Authelia forward-auth).
# Authelia sets Remote-User/Remote-Email headers that the API trusts; there are
# no /auth/* endpoints and no JWT tokens in the API itself.
# Users log in and out via http://auth.openledger.localhost.
paths:
  /healthz:
    get:
      summary: Liveness/readiness check
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
  /api/v1/commodities:
    get:
      summary: List commodities (shared reference data, not book-scoped)
      operationId: listCommodities
      responses:
        "200":
          description: All commodities, ordered by namespace then mnemonic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommodityList"
    post:
      summary: Create a commodity (currency or security)
      operationId: createCommodity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewCommodity"
      responses:
        "201":
          description: Commodity created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Commodity"
  /api/v1/books:
    get:
      summary: List the authenticated user's books
      operationId: listBooks
      responses:
        "200":
          description: The user's books
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookList"
    post:
      summary: Create a book (ledger/company) with its root account
      operationId: createBook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewBook"
      responses:
        "201":
          description: Book created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
  /api/v1/books/{id}:
    patch:
      summary: Rename a book or change its home currency (admin only)
      operationId: updateBook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBook"
      responses:
        "200":
          description: Book updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "403":
          description: Insufficient role (admin required)
        "404":
          description: Book not found
  /api/v1/books/{id}/accounts:
    get:
      summary: List a book's chart of accounts
      operationId: listAccounts
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The book's accounts (root excluded)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountList"
        "403":
          description: The authenticated user has no membership on this book
        "404":
          description: Book not found
  /api/v1/books/{id}/reports/balance-sheet:
    get:
      summary: Balance sheet (assets, liabilities, equity) as of a date
      operationId: getBalanceSheet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: asOf
          in: query
          description: Point in time (inclusive) the balances are taken at. Defaults to now.
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: The balance sheet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BalanceSheet"
        "400":
          description: Malformed asOf timestamp
        "403":
          description: The authenticated user has no membership on this book
        "404":
          description: Book not found
  /api/v1/books/{id}/reports/income-statement:
    get:
      summary: Income statement (income, expense, net) over a date range
      operationId: getIncomeStatement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: from
          in: query
          description: Start of the period (inclusive). Omit for an open lower bound.
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: End of the period (inclusive). Defaults to now.
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: The income statement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncomeStatement"
        "400":
          description: Malformed from/to timestamp
        "403":
          description: The authenticated user has no membership on this book
        "404":
          description: Book not found
  /api/v1/books/{id}/reports/cash-flow:
    get:
      summary: Cash flow statement (operating, investing, financing) over a date range
      operationId: getCashFlow
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: from
          in: query
          description: Start of the period (inclusive). Omit for an open lower bound.
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: End of the period (inclusive). Defaults to now.
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: The cash flow statement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashFlowStatement"
        "400":
          description: Malformed from/to timestamp
        "403":
          description: The authenticated user has no membership on this book
        "404":
          description: Book not found
  /api/v1/books/{id}/reports/cash-flow-forecast:
    get:
      summary: Cash flow forecast — projected cash from scheduled transactions
      operationId: getCashFlowForecast
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: from
          in: query
          description: Start of the projection (defaults to now).
          schema:
            type: string
            format: date-time
        - name: months
          in: query
          description: Number of whole months to project (1–60, default 6).
          schema:
            type: integer
            default: 6
      responses:
        "200":
          description: The cash flow forecast
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashFlowForecast"
        "400":
          description: Malformed from timestamp
        "403":
          description: The authenticated user has no membership on this book
        "404":
          description: Book not found
  /api/v1/books/{id}/reports/portfolio:
    get:
      summary: Portfolio (security holdings) report
      description: >
        Lists every STOCK/MUTUAL account in the book with its share quantity and
        cost basis, plus a market valuation derived from each commodity's most
        recent price quote. Holdings without a quote omit the market-value fields
        (hasPrice is false). Market values are not converted across currencies, so
        a holding is valued only in its own quote's currency.
      operationId: getPortfolio
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The portfolio report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Portfolio"
        "403":
          description: The authenticated user has no membership on this book
        "404":
          description: Book not found
  /api/v1/books/{id}/reports/capital-gains:
    get:
      summary: Realized capital-gains report
      description: >
        Itemizes the realized gains and losses posted to the book's Capital Gains
        accounts over a date range, oldest first, with their total. Amounts are in
        natural sign (positive is a gain).
      operationId: getCapitalGains
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: from
          in: query
          description: Start of the period (inclusive). Omit for an open lower bound.
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: End of the period (inclusive). Defaults to now.
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: The capital-gains report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapitalGainsReport"
        "400":
          description: Malformed from/to timestamp
        "403":
          description: The authenticated user has no membership on this book
        "404":
          description: Book not found
  /api/v1/books/{id}/reports/ar-aging:
    get:
      summary: Accounts-receivable aging report
      description: >
        Returns posted, unpaid customer invoices grouped into aging buckets
        (Current / 1-30 / 31-60 / 61-90 / 91+ days overdue) based on their
        due date (or post date + 30 days when no due date is set).
      operationId: arAgingReport
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: A/R aging report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgingReport"
        "403":
          description: The authenticated user has no membership on this book
        "404":
          description: Book not found

  /api/v1/books/{id}/reports/ap-aging:
    get:
      summary: Accounts-payable aging report
      description: >
        Returns posted, unpaid vendor bills grouped into aging buckets
        (Current / 1-30 / 31-60 / 61-90 / 91+ days overdue).
      operationId: apAgingReport
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: A/P aging report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgingReport"
        "403":
          description: The authenticated user has no membership on this book
        "404":
          description: Book not found

  /api/v1/securities/buy:
    post:
      summary: Buy a security
      description: >
        Posts a purchase: opens a cost-basis lot, tags the security split to it,
        and books the cash outflow. The security split's quantity is in shares and
        its value in the cash currency; the trading engine balances the
        commodities.
      operationId: buySecurity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Trade"
      responses:
        "201":
          description: The trade was posted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeResult"
        "400":
          description: Missing/invalid fields (e.g. non-positive shares or cash)
        "403":
          description: The user lacks editor+ on a book the accounts touch
        "404":
          description: An account does not exist
  /api/v1/securities/sell:
    post:
      summary: Sell a security
      description: >
        Posts a sale: matches the shares against the account's open lots FIFO,
        removes their cost basis, books the cash proceeds, and posts the realized
        gain (proceeds − cost) to the Capital Gains account so the transaction
        balances. Fully-consumed lots are closed.
      operationId: sellSecurity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Trade"
      responses:
        "201":
          description: The trade was posted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeResult"
        "400":
          description: Missing/invalid fields
        "403":
          description: The user lacks editor+ on a book the accounts touch
        "404":
          description: An account does not exist
        "422":
          description: Selling more shares than the account holds
  /api/v1/accounts:
    post:
      summary: Create an account in a book
      operationId: createAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewAccount"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400":
          description: Invalid input (missing field or unknown account type)
        "403":
          description: The user has no membership on this book, or a role below editor
        "404":
          description: Book not found
  /api/v1/transactions:
    post:
      summary: Post a balanced transaction
      operationId: postTransaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewTransaction"
      responses:
        "201":
          description: Transaction posted
        "403":
          description: The user has no membership, or a role below editor, on a book the splits touch
        "404":
          description: A split references an unknown account
        "422":
          description: Transaction does not balance to zero
  /api/v1/transactions/{id}:
    get:
      summary: Fetch a transaction with all its splits
      operationId: getTransaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The transaction and its splits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "403":
          description: The user has no membership on a book the splits touch
        "404":
          description: Transaction not found
    patch:
      summary: Replace a transaction and its splits
      description: >
        Wholesale replacement: the body has the same shape as a new
        transaction and overwrites the existing fields and all splits. The
        balance invariant is re-checked (422 on imbalance). The original
        enter_date is preserved.
      operationId: updateTransaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewTransaction"
      responses:
        "200":
          description: Transaction updated
        "403":
          description: The user lacks editor+ on a book the old or new splits touch
        "404":
          description: Transaction not found, or a split references an unknown account
        "422":
          description: Transaction does not balance to zero
    delete:
      summary: Delete a transaction and its splits
      operationId: deleteTransaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Transaction deleted
        "403":
          description: The user lacks editor+ on a book the transaction's splits touch
        "404":
          description: Transaction not found
  /api/v1/accounts/{id}/register:
    get:
      summary: Paginated account register with running balances
      operationId: getAccountRegister
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: A page of the register
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterPage"
        "403":
          description: The authenticated user has no membership on this account's book
        "404":
          description: Account not found
  /api/v1/splits/{id}/reconcile:
    patch:
      summary: Set a split's reconcile state
      description: >
        Marks a single split with a GnuCash reconcile flag — "n" (unmarked),
        "c" (cleared), or "y" (reconciled) — stamping a reconcile date for
        cleared/reconciled and clearing it for unmarked. This only annotates the
        split; it never changes any amount, so it does not go through the posting
        service. Requires editor access to the split's book.
      operationId: reconcileSplit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [state]
              properties:
                state:
                  type: string
                  description: Single-character GnuCash reconcile flag.
                  enum: ["n", "c", "y"]
      responses:
        "200":
          description: The split's new reconcile state
          content:
            application/json:
              schema:
                type: object
                properties:
                  splitGuid:
                    type: string
                  state:
                    type: string
        "400":
          description: Missing or invalid reconcile state
        "403":
          description: The user's role does not permit editing this book
        "404":
          description: Split not found
  /api/v1/prices:
    get:
      summary: List a commodity's price quotes (shared reference data)
      operationId: listPrices
      parameters:
        - name: commodity
          in: query
          required: true
          description: GUID of the commodity to fetch quotes for.
          schema:
            type: string
      responses:
        "200":
          description: The commodity's quotes, most recent first
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceList"
        "400":
          description: The commodity query parameter is missing
    post:
      summary: Record a price quote (one unit of commodity in currency)
      operationId: createPrice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewPrice"
      responses:
        "201":
          description: Price recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Price"
        "400":
          description: Invalid input (missing commodity/currency or zero value)
  /api/v1/prices/fetch:
    post:
      summary: Fetch an online quote and record it as a price
      description: >
        Fetches a live exchange rate from the configured quote provider
        (Frankfurter / ECB reference rates by default) for one unit of the
        commodity expressed in the currency, and records it as a price.
        Currently supports currency commodities only; both GUIDs must resolve to
        CURRENCY commodities and must differ. Prices are shared reference data,
        so no book authorization applies.
      operationId: fetchPrice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FetchPrice"
      responses:
        "201":
          description: Quote fetched and recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Price"
        "400":
          description: Invalid input (missing GUIDs, same GUID, or non-currency commodity)
        "404":
          description: Commodity or currency not found
        "502":
          description: The upstream quote provider failed or returned no rate
        "503":
          description: Online quotes are not configured on this server

  /api/v1/prices/refresh-status:
    get:
      summary: Get the price auto-refresh status
      operationId: getPriceRefreshStatus
      responses:
        "200":
          description: Auto-refresh configuration and last run result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceRefreshStatus"

  /api/v1/prices/refresh-now:
    post:
      summary: Trigger an immediate price refresh for all recorded pairs
      operationId: refreshPricesNow
      responses:
        "200":
          description: Refresh completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceRefreshResult"
        "503":
          description: Online quotes are not configured on this server

  /api/v1/imports/gnucash:
    post:
      summary: Import a GnuCash file as a new book
      description: >
        Uploads a GnuCash file and persists it as a new book owned by the
        authenticated user, preserving GnuCash GUIDs. Both on-disk formats are
        accepted and auto-detected from the file's contents: the SQLite backend
        (highest fidelity) and the XML format (plain or gzipped, GnuCash's
        default). Every transaction is re-validated to balance on the way in; if
        any does not, the whole import is rejected with 422.
      operationId: importGnuCash
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: A GnuCash SQLite or XML (optionally gzipped) file.
      responses:
        "201":
          description: Book imported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"
        "400":
          description: Missing upload or the file is not a recognised GnuCash SQLite or XML document
        "409":
          description: The book has already been imported (GUID collision)
        "422":
          description: The file contains one or more unbalanced transactions
  /api/v1/accounts/{id}/import-bank:
    post:
      summary: Import an OFX/QIF/CSV bank statement into an account
      description: >
        Uploads a bank statement and posts each line into the given account as a
        balanced two-split transaction, offsetting to the book's Imbalance-CUR
        account (recategorise later). The format comes from the `format` field or
        is sniffed (OFX/QIF). CSV additionally requires a `mapping` JSON field
        (see CsvMapping) describing which columns hold the date, amount (single
        signed column, or debit/credit columns), and description — build it from
        the preview endpoint. Lines already present — matched by import ref (OFX
        FITID, else a content hash) — are skipped, so re-importing an overlapping
        statement is safe. Requires editor+ on the account's book.
      operationId: importBankStatement
      parameters:
        - name: id
          in: path
          required: true
          description: GUID of the currency account to import into.
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: An OFX, QIF, or CSV statement file.
                format:
                  type: string
                  enum: [ofx, qif, csv]
                  description: Optional for OFX/QIF (sniffed); required (csv) for CSV.
                mapping:
                  type: string
                  description: >
                    Required when format is csv: a JSON-encoded CsvMapping.
      responses:
        "201":
          description: Statement imported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BankImportResult"
        "400":
          description: Missing upload, unsupported format, bad CSV mapping, or a non-currency account
        "403":
          description: The user lacks editor access to the account's book
        "404":
          description: The account does not exist
        "422":
          description: A statement line could not be posted as a balanced transaction
  /api/v1/accounts/{id}/import-bank/preview:
    post:
      summary: Preview an uploaded CSV for column mapping
      description: >
        Parses an uploaded CSV (robust quoted-field handling) and returns its
        first rows so the import wizard can build a column mapping. Nothing is
        persisted. Requires editor+ on the account's book.
      operationId: previewBankCsv
      parameters:
        - name: id
          in: path
          required: true
          description: GUID of the account the statement will be imported into.
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: A CSV statement file.
      responses:
        "200":
          description: Parsed preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CsvPreview"
        "400":
          description: Missing upload or the file could not be parsed as CSV
        "403":
          description: The user lacks editor access to the account's book
  /api/v1/books/{id}/export/gnucash:
    get:
      summary: Export a book as a GnuCash file
      description: >
        Streams the book back as a GnuCash file, preserving GnuCash GUIDs and
        storing each amount at its commodity's fraction, so the file can be
        re-imported by GnuCash or OpenLedger. The on-disk format is chosen by the
        `format` query parameter: `sqlite` (the default, highest-fidelity target)
        or `xml` (the portable, human-readable form; commodity GUIDs and the
        template root are not preserved in XML).
      operationId: exportGnuCash
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: format
          in: query
          required: false
          description: The on-disk GnuCash format to export.
          schema:
            type: string
            enum: [sqlite, xml]
            default: sqlite
      responses:
        "200":
          description: The book as a GnuCash file in the requested format
          content:
            application/x-sqlite3:
              schema:
                type: string
                format: binary
            application/xml:
              schema:
                type: string
                format: binary
        "400":
          description: Unsupported format value
        "403":
          description: The authenticated user has no membership on this book
        "404":
          description: Book not found
  /api/v1/books/{id}/scheduled-transactions:
    get:
      summary: List scheduled transactions for a book
      operationId: listScheduledTransactions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: All scheduled transactions for the book
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduledTransactionList"
        "403":
          description: No membership on this book
        "404":
          description: Book not found
    post:
      summary: Create a scheduled transaction
      operationId: createScheduledTransaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
