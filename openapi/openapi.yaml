openapi: 3.1.0
info:
  title: OpenLedger API
  version: 0.1.0
  description: >
    GnuCash-derived double-entry accounting API. This spec is the source of
    truth for request/response shapes; the web frontend consumes a generated
    TypeScript client. Money is always exact rational num/denom pairs, never a
    JSON float.
servers:
  - url: http://openledger.localhost
# Authentication is handled at the proxy layer (Traefik + Authelia forward-auth).
# Authelia sets Remote-User/Remote-Email headers that the API trusts; there are
# no /auth/* endpoints and no JWT tokens in the API itself.
# Users log in and out via http://auth.openledger.localhost.
paths:
  /healthz:
    get:
      summary: Liveness/readiness check
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
  /api/v1/commodities:
    get:
      summary: List commodities (shared reference data, not book-scoped)
      operationId: listCommodities
      responses:
        "200":
          description: All commodities, ordered by namespace then mnemonic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommodityList"
    post:
      summary: Create a commodity (currency or security)
      operationId: createCommodity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewCommodity"
      responses:
        "201":
          description: Commodity created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Commodity"
  /api/v1/books:
    get:
      summary: List the authenticated user's books
      operationId: listBooks
      responses:
        "200":
          description: The user's books
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookList"
    post:
      summary: Create a book (ledger) with its root account
      operationId: createBook
      responses:
        "201":
          description: Book created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
  /api/v1/books/{id}/accounts:
    get:
      summary: List a book's chart of accounts
      operationId: listAccounts
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The book's accounts (root excluded)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountList"
        "403":
          description: The authenticated user has no membership on this book
        "404":
          description: Book not found
  /api/v1/books/{id}/reports/balance-sheet:
    get:
      summary: Balance sheet (assets, liabilities, equity) as of a date
      operationId: getBalanceSheet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: asOf
          in: query
          description: Point in time (inclusive) the balances are taken at. Defaults to now.
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: The balance sheet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BalanceSheet"
        "400":
          description: Malformed asOf timestamp
        "403":
          description: The authenticated user has no membership on this book
        "404":
          description: Book not found
  /api/v1/books/{id}/reports/income-statement:
    get:
      summary: Income statement (income, expense, net) over a date range
      operationId: getIncomeStatement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: from
          in: query
          description: Start of the period (inclusive). Omit for an open lower bound.
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: End of the period (inclusive). Defaults to now.
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: The income statement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncomeStatement"
        "400":
          description: Malformed from/to timestamp
        "403":
          description: The authenticated user has no membership on this book
        "404":
          description: Book not found
  /api/v1/books/{id}/reports/portfolio:
    get:
      summary: Portfolio (security holdings) report
      description: >
        Lists every STOCK/MUTUAL account in the book with its share quantity and
        cost basis, plus a market valuation derived from each commodity's most
        recent price quote. Holdings without a quote omit the market-value fields
        (hasPrice is false). Market values are not converted across currencies, so
        a holding is valued only in its own quote's currency.
      operationId: getPortfolio
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The portfolio report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Portfolio"
        "403":
          description: The authenticated user has no membership on this book
        "404":
          description: Book not found
  /api/v1/books/{id}/reports/capital-gains:
    get:
      summary: Realized capital-gains report
      description: >
        Itemizes the realized gains and losses posted to the book's Capital Gains
        accounts over a date range, oldest first, with their total. Amounts are in
        natural sign (positive is a gain).
      operationId: getCapitalGains
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: from
          in: query
          description: Start of the period (inclusive). Omit for an open lower bound.
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: End of the period (inclusive). Defaults to now.
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: The capital-gains report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapitalGainsReport"
        "400":
          description: Malformed from/to timestamp
        "403":
          description: The authenticated user has no membership on this book
        "404":
          description: Book not found
  /api/v1/securities/buy:
    post:
      summary: Buy a security
      description: >
        Posts a purchase: opens a cost-basis lot, tags the security split to it,
        and books the cash outflow. The security split's quantity is in shares and
        its value in the cash currency; the trading engine balances the
        commodities.
      operationId: buySecurity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Trade"
      responses:
        "201":
          description: The trade was posted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeResult"
        "400":
          description: Missing/invalid fields (e.g. non-positive shares or cash)
        "403":
          description: The user lacks editor+ on a book the accounts touch
        "404":
          description: An account does not exist
  /api/v1/securities/sell:
    post:
      summary: Sell a security
      description: >
        Posts a sale: matches the shares against the account's open lots FIFO,
        removes their cost basis, books the cash proceeds, and posts the realized
        gain (proceeds − cost) to the Capital Gains account so the transaction
        balances. Fully-consumed lots are closed.
      operationId: sellSecurity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Trade"
      responses:
        "201":
          description: The trade was posted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeResult"
        "400":
          description: Missing/invalid fields
        "403":
          description: The user lacks editor+ on a book the accounts touch
        "404":
          description: An account does not exist
        "422":
          description: Selling more shares than the account holds
  /api/v1/accounts:
    post:
      summary: Create an account in a book
      operationId: createAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewAccount"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400":
          description: Invalid input (missing field or unknown account type)
        "403":
          description: The user has no membership on this book, or a role below editor
        "404":
          description: Book not found
  /api/v1/transactions:
    post:
      summary: Post a balanced transaction
      operationId: postTransaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewTransaction"
      responses:
        "201":
          description: Transaction posted
        "403":
          description: The user has no membership, or a role below editor, on a book the splits touch
        "404":
          description: A split references an unknown account
        "422":
          description: Transaction does not balance to zero
  /api/v1/transactions/{id}:
    get:
      summary: Fetch a transaction with all its splits
      operationId: getTransaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The transaction and its splits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "403":
          description: The user has no membership on a book the splits touch
        "404":
          description: Transaction not found
    patch:
      summary: Replace a transaction and its splits
      description: >
        Wholesale replacement: the body has the same shape as a new
        transaction and overwrites the existing fields and all splits. The
        balance invariant is re-checked (422 on imbalance). The original
        enter_date is preserved.
      operationId: updateTransaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewTransaction"
      responses:
        "200":
          description: Transaction updated
        "403":
          description: The user lacks editor+ on a book the old or new splits touch
        "404":
          description: Transaction not found, or a split references an unknown account
        "422":
          description: Transaction does not balance to zero
    delete:
      summary: Delete a transaction and its splits
      operationId: deleteTransaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Transaction deleted
        "403":
          description: The user lacks editor+ on a book the transaction's splits touch
        "404":
          description: Transaction not found
  /api/v1/accounts/{id}/register:
    get:
      summary: Paginated account register with running balances
      operationId: getAccountRegister
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: A page of the register
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterPage"
        "403":
          description: The authenticated user has no membership on this account's book
        "404":
          description: Account not found
  /api/v1/splits/{id}/reconcile:
    patch:
      summary: Set a split's reconcile state
      description: >
        Marks a single split with a GnuCash reconcile flag — "n" (unmarked),
        "c" (cleared), or "y" (reconciled) — stamping a reconcile date for
        cleared/reconciled and clearing it for unmarked. This only annotates the
        split; it never changes any amount, so it does not go through the posting
        service. Requires editor access to the split's book.
      operationId: reconcileSplit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [state]
              properties:
                state:
                  type: string
                  description: Single-character GnuCash reconcile flag.
                  enum: ["n", "c", "y"]
      responses:
        "200":
          description: The split's new reconcile state
          content:
            application/json:
              schema:
                type: object
                properties:
                  splitGuid:
                    type: string
                  state:
                    type: string
        "400":
          description: Missing or invalid reconcile state
        "403":
          description: The user's role does not permit editing this book
        "404":
          description: Split not found
  /api/v1/prices:
    get:
      summary: List a commodity's price quotes (shared reference data)
      operationId: listPrices
      parameters:
        - name: commodity
          in: query
          required: true
          description: GUID of the commodity to fetch quotes for.
          schema:
            type: string
      responses:
        "200":
          description: The commodity's quotes, most recent first
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceList"
        "400":
          description: The commodity query parameter is missing
    post:
      summary: Record a price quote (one unit of commodity in currency)
      operationId: createPrice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewPrice"
      responses:
        "201":
          description: Price recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Price"
        "400":
          description: Invalid input (missing commodity/currency or zero value)
  /api/v1/imports/gnucash:
    post:
      summary: Import a GnuCash file as a new book
      description: >
        Uploads a GnuCash file and persists it as a new book owned by the
        authenticated user, preserving GnuCash GUIDs. Both on-disk formats are
        accepted and auto-detected from the file's contents: the SQLite backend
        (highest fidelity) and the XML format (plain or gzipped, GnuCash's
        default). Every transaction is re-validated to balance on the way in; if
        any does not, the whole import is rejected with 422.
      operationId: importGnuCash
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: A GnuCash SQLite or XML (optionally gzipped) file.
      responses:
        "201":
          description: Book imported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"
        "400":
          description: Missing upload or the file is not a recognised GnuCash SQLite or XML document
        "409":
          description: The book has already been imported (GUID collision)
        "422":
          description: The file contains one or more unbalanced transactions
  /api/v1/books/{id}/export/gnucash:
    get:
      summary: Export a book as a GnuCash file
      description: >
        Streams the book back as a GnuCash file, preserving GnuCash GUIDs and
        storing each amount at its commodity's fraction, so the file can be
        re-imported by GnuCash or OpenLedger. The on-disk format is chosen by the
        `format` query parameter: `sqlite` (the default, highest-fidelity target)
        or `xml` (the portable, human-readable form; commodity GUIDs and the
        template root are not preserved in XML).
      operationId: exportGnuCash
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: format
          in: query
          required: false
          description: The on-disk GnuCash format to export.
          schema:
            type: string
            enum: [sqlite, xml]
            default: sqlite
      responses:
        "200":
          description: The book as a GnuCash file in the requested format
          content:
            application/x-sqlite3:
              schema:
                type: string
                format: binary
            application/xml:
              schema:
                type: string
                format: binary
        "400":
          description: Unsupported format value
        "403":
          description: The authenticated user has no membership on this book
        "404":
          description: Book not found
  /api/v1/books/{id}/scheduled-transactions:
    get:
      summary: List scheduled transactions for a book
      operationId: listScheduledTransactions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: All scheduled transactions for the book
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduledTransactionList"
        "403":
          description: No membership on this book
        "404":
          description: Book not found
    post:
      summary: Create a scheduled transaction
      operationId: createScheduledTransaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewScheduledTransaction"
      responses:
        "201":
          description: Scheduled transaction created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduledTransaction"
        "400":
          description: Invalid input
        "422":
          description: Template splits do not balance to zero
  /api/v1/books/{id}/scheduled-transactions/post-due:
    post:
      summary: Post all due scheduled transactions
      description: >
        Posts every enabled scheduled transaction whose next due date is on or
        before `asOf` (defaults to now). Returns the list of transactions created.
      operationId: postDueScheduledTransactions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: asOf
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: List of transactions that were posted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostDueResult"
        "403":
          description: No membership on this book
  /api/v1/scheduled-transactions/{id}:
    get:
      summary: Get a scheduled transaction
      operationId: getScheduledTransaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The scheduled transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduledTransaction"
        "404":
          description: Scheduled transaction not found
    patch:
      summary: Update a scheduled transaction
      operationId: updateScheduledTransaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewScheduledTransaction"
      responses:
        "200":
          description: Updated scheduled transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduledTransaction"
        "400":
          description: Invalid input
        "404":
          description: Scheduled transaction not found
        "422":
          description: Template splits do not balance to zero
    delete:
      summary: Delete a scheduled transaction
      operationId: deleteScheduledTransaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "404":
          description: Scheduled transaction not found
components:
  schemas:
    Health:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
    NewCommodity:
      type: object
      required: [mnemonic]
      properties:
        namespace:
          type: string
          description: Defaults to CURRENCY.
        mnemonic:
          type: string
          example: USD
        fullname:
          type: string
        fraction:
          type: integer
          format: int64
          description: Smallest-unit denominator. Defaults to 100.
          example: 100
    Commodity:
      type: object
      properties:
        guid:
          type: string
        namespace:
          type: string
        mnemonic:
          type: string
        fraction:
          type: integer
          format: int64
    CommodityList:
      type: object
      properties:
        commodities:
          type: array
          items:
            $ref: "#/components/schemas/Commodity"
    NewPrice:
      type: object
      required: [commodityGuid, currencyGuid, value]
      properties:
        commodityGuid:
          type: string
          description: The commodity being priced.
        currencyGuid:
          type: string
          description: The currency the value is expressed in.
        date:
          type: string
          format: date-time
          description: Defaults to now when omitted.
        source:
          type: string
          description: Free-form provenance. Defaults to "user:price".
        type:
          type: string
        value:
          allOf:
            - $ref: "#/components/schemas/Numeric"
          description: Units of currency per one unit of commodity.
    Price:
      type: object
      properties:
        guid:
          type: string
        commodityGuid:
          type: string
        currencyGuid:
          type: string
        date:
          type: string
          format: date-time
        source:
          type: string
        type:
          type: string
        value:
          $ref: "#/components/schemas/Numeric"
    PriceList:
      type: object
      properties:
        prices:
          type: array
          items:
            $ref: "#/components/schemas/Price"
    Book:
      type: object
      properties:
        guid:
          type: string
        rootAccountGuid:
          type: string
          description: Parent for top-level accounts.
    BookList:
      type: object
      properties:
        books:
          type: array
          items:
            $ref: "#/components/schemas/Book"
    NewAccount:
      type: object
      required: [bookGuid, name, type]
      properties:
        bookGuid:
          type: string
        parentGuid:
          type: string
          description: Defaults to the book's root account when omitted.
        name:
          type: string
        type:
          type: string
          description: GnuCash account type (ASSET, BANK, EXPENSE, EQUITY, …).
        commodityGuid:
          type: string
          description: Required for non-ROOT accounts.
        code:
          type: string
        description:
          type: string
        placeholder:
          type: boolean
    Account:
      type: object
      properties:
        guid:
          type: string
        name:
          type: string
        type:
          type: string
        commodityGuid:
          type: string
        parentGuid:
          type: string
        code:
          type: string
        description:
          type: string
        placeholder:
          type: boolean
    AccountWithBalance:
      allOf:
        - $ref: "#/components/schemas/Account"
        - type: object
          properties:
            balance:
              allOf:
                - $ref: "#/components/schemas/Numeric"
              description: >-
                Sum of the account's own splits, in its own commodity, rendered
                at the commodity fraction. Excludes subtree roll-ups.
            subtreeBalance:
              allOf:
                - $ref: "#/components/schemas/Numeric"
              description: >-
                The account's own balance plus the balances of all descendants
                sharing its commodity (the roll-up shown against placeholder
                parents). Descendants in a different commodity are not converted.
    AccountList:
      type: object
      properties:
        bookGuid:
          type: string
        accounts:
          type: array
          items:
            $ref: "#/components/schemas/AccountWithBalance"
    ReportLine:
      type: object
      description: One account's natural-sign balance within a report section.
      properties:
        account:
          $ref: "#/components/schemas/Account"
        balance:
          $ref: "#/components/schemas/Numeric"
    ReportSection:
      type: object
      description: >-
        A group of report lines with their total, both in natural sign
        (positive for the account type's normal direction). Zero-balance
        accounts are omitted.
      properties:
        lines:
          type: array
          items:
            $ref: "#/components/schemas/ReportLine"
        total:
          $ref: "#/components/schemas/Numeric"
    BalanceSheet:
      type: object
      description: >-
        Point-in-time statement of financial position. For a balanced book,
        assets.total equals totalLiabilitiesAndEquity. Single-currency only;
        balances are not converted across commodities.
      properties:
        bookGuid:
          type: string
        asOf:
          type: string
          format: date-time
        assets:
          $ref: "#/components/schemas/ReportSection"
        liabilities:
          $ref: "#/components/schemas/ReportSection"
        equity:
          $ref: "#/components/schemas/ReportSection"
        retainedEarnings:
          allOf:
            - $ref: "#/components/schemas/Numeric"
          description: Net income for the period, folded into equity.
        totalLiabilitiesAndEquity:
          $ref: "#/components/schemas/Numeric"
    IncomeStatement:
      type: object
      description: Statement of performance over [from, to]. Single-currency only.
      properties:
        bookGuid:
          type: string
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        income:
          $ref: "#/components/schemas/ReportSection"
        expense:
          $ref: "#/components/schemas/ReportSection"
        netIncome:
          allOf:
            - $ref: "#/components/schemas/Numeric"
          description: Total income minus total expense.
    Portfolio:
      type: object
      description: Security-holdings report for a book.
      properties:
        bookGuid:
          type: string
        holdings:
          type: array
          items:
            $ref: "#/components/schemas/Holding"
    Holding:
      type: object
      description: >-
        One security position. shares is in the account's commodity; costBasis,
        price, marketValue and unrealizedGain are in the quote currency. When
        hasPrice is false the market-value fields are absent.
      required: [account, shares, costBasis, hasPrice]
      properties:
        account:
          $ref: "#/components/schemas/Account"
        shares:
          $ref: "#/components/schemas/Numeric"
        costBasis:
          $ref: "#/components/schemas/Numeric"
        hasPrice:
          type: boolean
        price:
          $ref: "#/components/schemas/Numeric"
        priceCurrencyGuid:
          type: string
        marketValue:
          $ref: "#/components/schemas/Numeric"
        unrealizedGain:
          $ref: "#/components/schemas/Numeric"
    CapitalGainsReport:
      type: object
      description: Realized gains/losses over [from, to], in natural sign.
      properties:
        bookGuid:
          type: string
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        lines:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date-time
              description:
                type: string
              account:
                type: string
              amount:
                $ref: "#/components/schemas/Numeric"
        total:
          $ref: "#/components/schemas/Numeric"
    Trade:
      type: object
      description: A security buy or sell request.
      required: [securityAccountGuid, cashAccountGuid, shares, cash]
      properties:
        securityAccountGuid:
          type: string
        cashAccountGuid:
          type: string
        shares:
          allOf:
            - $ref: "#/components/schemas/Numeric"
          description: Quantity of shares, in the security's commodity.
        cash:
          allOf:
            - $ref: "#/components/schemas/Numeric"
          description: Total cash paid (buy) or received (sell), in the cash currency.
        description:
          type: string
        postDate:
          type: string
          format: date-time
    TradeResult:
      type: object
      required: [transactionGuid, realizedGain]
      properties:
        transactionGuid:
          type: string
        realizedGain:
          allOf:
            - $ref: "#/components/schemas/Numeric"
          description: Realized gain for a sale (zero for a buy).
    Numeric:
      type: object
      description: Exact rational amount (numerator/denominator).
      required: [num, denom]
      properties:
        num:
          type: integer
          format: int64
        denom:
          type: integer
          format: int64
          example: 100
    NewSplit:
      type: object
      required: [accountGuid, value, quantity]
      properties:
        accountGuid:
          type: string
        memo:
          type: string
        value:
          $ref: "#/components/schemas/Numeric"
        quantity:
          $ref: "#/components/schemas/Numeric"
    NewTransaction:
      type: object
      required: [currencyGuid, postDate, splits]
      properties:
        currencyGuid:
          type: string
        num:
          type: string
        postDate:
          type: string
          format: date-time
        description:
          type: string
        splits:
          type: array
          minItems: 2
          items:
            $ref: "#/components/schemas/NewSplit"
    Split:
      type: object
      properties:
        guid:
          type: string
        accountGuid:
          type: string
        memo:
          type: string
        action:
          type: string
        value:
          $ref: "#/components/schemas/Numeric"
        quantity:
          $ref: "#/components/schemas/Numeric"
    Transaction:
      type: object
      properties:
        guid:
          type: string
        currencyGuid:
          type: string
        num:
          type: string
        postDate:
          type: string
          format: date-time
        description:
          type: string
        splits:
          type: array
          items:
            $ref: "#/components/schemas/Split"
    RegisterEntry:
      type: object
      properties:
        splitGuid:
          type: string
        txGuid:
          type: string
        postDate:
          type: string
          format: date-time
        description:
          type: string
        memo:
          type: string
        reconcile:
          type: string
          description: GnuCash reconcile flag (n/c/y/f/v).
        value:
          $ref: "#/components/schemas/Numeric"
        quantity:
          $ref: "#/components/schemas/Numeric"
        balance:
          $ref: "#/components/schemas/Numeric"
          description: Running balance in the account commodity.
    RegisterPage:
      type: object
      properties:
        accountGuid:
          type: string
        total:
          type: integer
          format: int64
        limit:
          type: integer
        offset:
          type: integer
        entries:
          type: array
          items:
            $ref: "#/components/schemas/RegisterEntry"
    ImportResult:
      type: object
      description: Summary of a completed GnuCash import.
      properties:
        bookGuid:
          type: string
          description: GUID of the newly created book (preserved from the file).
        commodities:
          type: integer
          description: Number of commodities imported.
        accounts:
          type: integer
          description: Number of accounts imported (including root accounts).
        transactions:
          type: integer
          description: Number of transactions imported.
    ScheduledSplit:
      type: object
      required: [accountGuid, value]
      properties:
        guid:
          type: string
        accountGuid:
          type: string
        memo:
          type: string
        value:
          $ref: "#/components/schemas/Numeric"
    NewScheduledTransaction:
      type: object
      required: [name, currencyGuid, period, startDate, splits]
      properties:
        name:
          type: string
          example: Monthly Rent
        description:
          type: string
        enabled:
          type: boolean
          default: true
        currencyGuid:
          type: string
        period:
          type: string
          enum: [once, daily, weekly, monthly, yearly]
        every:
          type: integer
          minimum: 1
          default: 1
          description: Multiplier on period (e.g. every=2 + period=weekly → biweekly).
        startDate:
          type: string
          format: date
          example: "2024-01-01"
        endDate:
          type: string
          format: date
          description: Optional end date; omit for indefinite recurrence.
        splits:
          type: array
          minItems: 2
          items:
            $ref: "#/components/schemas/ScheduledSplit"
    ScheduledTransaction:
      allOf:
        - $ref: "#/components/schemas/NewScheduledTransaction"
        - type: object
          properties:
            guid:
              type: string
            bookGuid:
              type: string
            lastPostedDate:
              type: string
              format: date
            nextDueDate:
              type: string
              format: date
    ScheduledTransactionList:
      type: object
      properties:
        bookGuid:
          type: string
        scheduledTransactions:
          type: array
          items:
            $ref: "#/components/schemas/ScheduledTransaction"
    PostDueResult:
      type: object
      properties:
        bookGuid:
          type: string
        posted:
          type: array
          items:
            type: object
            properties:
              scheduleGuid:
                type: string
              name:
                type: string
              postDate:
                type: string
                format: date
              txGuid:
                type: string
